title: Louis Brion
description: Documenting my journey to AI proficiency — tools, experiments, and learnings along the way.
author: Louis Brion
email: ""
url: "https://louisbrion.com"

theme: minima
show_excerpts: true

header_pages:
  - projects.md
  - about.md
  - search.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
