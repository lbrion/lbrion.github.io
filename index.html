<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Louis Brion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e8e8e4;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #2563eb;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      padding: 72px 24px 64px;
      max-width: 860px;
      margin: 0 auto;
    }

    .name {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .bio {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.7;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 96px;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* Placeholder card shown when no projects exist yet */
    .empty-state {
      grid-column: 1 / -1;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer {
      border-top: 1px solid var(--border);
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-name {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      font-size: 0.825rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--accent); }

    @media (max-width: 480px) {
      header { padding: 48px 20px 40px; }
      main { padding: 0 20px 64px; }
      footer { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="name">Louis Brion</h1>
    <p class="bio">Projects coming soon.</p>
  </header>

  <main>
    <p class="section-label">Projects</p>
    <div class="projects">
      <div class="empty-state">Projects will appear here.</div>
    </div>
  </main>

  <footer>
    <span class="footer-name">Louis Brion</span>
    <div class="footer-links">
      <a href="https://github.com/lbrion" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

</body>
</html>
